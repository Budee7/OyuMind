<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OyuMind – Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #e8e0f0; --card-white: #ffffff; --pill-bg: #e0d4f0;
      --pill-hover: #d0c0e8; --purple: #7c4dbd; --purple-mid: #9b6dd4;
      --text-dark: #2a1a4e; --text-mid: #6040a0; --text-muted: #9880b8; --accent: #e8a0b0; --green: #4caf50;
    }
    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #3b2472 0%, #1f1448 100%);
      font-family: 'Nunito', sans-serif;
      display: flex; align-items: center; justify-content: center; padding: 24px 16px;
    }
    .phone {
      width: 340px; min-height: 680px; background: var(--bg);
      border-radius: 40px; overflow: hidden;
      box-shadow: 0 40px 80px rgba(10,5,30,0.65), 0 0 0 1px rgba(255,255,255,0.1) inset;
      display: flex; flex-direction: column; padding-bottom: 28px;
    }
    .topbar { display: flex; align-items: center; gap: 10px; padding: 28px 22px 6px; }
    .logo-text { font-weight: 800; font-size: 22px; color: var(--text-dark); }
    .logo-text span { color: var(--purple); }
    .tagline-top { text-align: center; font-size: 10px; letter-spacing: 2px; color: var(--text-muted); padding-bottom: 10px; }
    .tagline-top span { color: var(--accent); margin: 0 2px; }
    .card {
      background: var(--card-white); border-radius: 22px;
      padding: 18px 16px; margin: 0 14px 14px;
      box-shadow: 0 2px 12px rgba(100,60,180,0.08);
    }
    .card-title { font-weight: 800; font-size: 16px; color: var(--text-dark); text-align: center; margin-bottom: 14px; }
    .task-pill {
      display: flex; align-items: center; justify-content: center;
      background: var(--pill-bg); border-radius: 14px; height: 44px;
      margin-bottom: 10px; cursor: pointer; color: var(--text-mid); font-size: 20px;
      transition: background 0.18s;
    }
    .task-pill:hover { background: var(--pill-hover); }
    .task-pill:last-child { margin-bottom: 0; }
    .mood-row { display: flex; justify-content: space-around; margin-top: 4px; }
    .mood-item { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
    .mood-emoji {
      width: 42px; height: 42px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-size: 22px;
      transition: transform 0.18s;
    }
    .mood-emoji:hover { transform: scale(1.15); }
    .mood-label { font-size: 10px; color: var(--text-muted); font-weight: 600; }
    .week-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 14px; margin: 4px 14px 14px;
    }
    .day-item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .day-dot {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid #d4c4e8; display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: border-color 0.18s;
    }
    .day-dot.done { background: var(--green); border-color: var(--green); }
    .day-dot.done::after { content: '✓'; color: #fff; font-size: 13px; font-weight: 800; }
    .day-label { font-size: 10px; color: var(--text-muted); font-weight: 700; }
    .ask-btn { display: flex; flex-direction: column; align-items: center; gap: 6px; margin-top: auto; cursor: pointer; }
    .ask-circle {
      width: 48px; height: 48px; background: var(--purple-mid); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-size: 20px;
      box-shadow: 0 4px 16px rgba(120,60,200,0.35); transition: transform 0.18s, box-shadow 0.18s;
    }
    .ask-circle:hover { transform: scale(1.08); box-shadow: 0 6px 22px rgba(120,60,200,0.5); }
    .ask-label { font-size: 13px; font-weight: 700; color: var(--text-mid); }
  </style>
</head>
<body>
<div class="phone">
  <div class="topbar">
    <svg viewBox="0 0 64 56" fill="none" width="36">
      <ellipse cx="32" cy="36" rx="8" ry="18" fill="url(#pg1)" opacity="0.95"/>
      <ellipse cx="18" cy="38" rx="7" ry="16" fill="#c47a8a" opacity="0.7" transform="rotate(-22 18 38)"/>
      <ellipse cx="46" cy="38" rx="7" ry="16" fill="#c47a8a" opacity="0.7" transform="rotate(22 46 38)"/>
      <ellipse cx="8"  cy="42" rx="6" ry="13" fill="#a05070" opacity="0.45" transform="rotate(-40 8 42)"/>
      <ellipse cx="56" cy="42" rx="6" ry="13" fill="#a05070" opacity="0.45" transform="rotate(40 56 42)"/>
      <ellipse cx="20" cy="50" rx="14" ry="5" fill="#5a8a6a" opacity="0.75" transform="rotate(-15 20 50)"/>
      <ellipse cx="44" cy="50" rx="14" ry="5" fill="#5a8a6a" opacity="0.75" transform="rotate(15 44 50)"/>
      <defs><linearGradient id="pg1" x1="32" y1="18" x2="32" y2="54" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#f0b8c8"/><stop offset="100%" stop-color="#c06080"/>
      </linearGradient></defs>
    </svg>
    <div class="logo-text">Oyu<span>Mind</span></div>
  </div>
  <div class="tagline-top">focus <span>•</span> balance <span>•</span> bloom</div>

  <div class="card">
    <div class="card-title">Today's Tasks</div>
    <div class="task-pill" onclick="location.href='oyumind-subjects.html'">＋</div>
    <div class="task-pill" onclick="location.href='oyumind-subjects.html'">＋</div>
  </div>

  <div class="card">
    <div class="card-title" style="text-align:left;margin-bottom:12px;">Mood Tracker</div>
    <div class="mood-row">
      <div class="mood-item" onclick="selectMood(this)">
        <div class="mood-emoji" style="background:#fde8e8;">😠</div>
        <div class="mood-label">Angry</div>
      </div>
      <div class="mood-item" onclick="selectMood(this)">
        <div class="mood-emoji" style="background:#fef9e0;">😊</div>
        <div class="mood-label">Happy</div>
      </div>
      <div class="mood-item" onclick="selectMood(this)">
        <div class="mood-emoji" style="background:#e8f0fe;">😢</div>
        <div class="mood-label">Sad</div>
      </div>
      <div class="mood-item" onclick="selectMood(this)">
        <div class="mood-emoji" style="background:#ede8fe;">😪</div>
        <div class="mood-label">Tired</div>
      </div>
    </div>
  </div>

  <div class="week-row">
    <div class="day-item"><div class="day-dot done"></div><div class="day-label">M</div></div>
    <div class="day-item"><div class="day-dot" onclick="toggleDay(this)"></div><div class="day-label">T</div></div>
    <div class="day-item"><div class="day-dot" onclick="toggleDay(this)"></div><div class="day-label">W</div></div>
    <div class="day-item"><div class="day-dot" onclick="toggleDay(this)"></div><div class="day-label">T</div></div>
    <div class="day-item"><div class="day-dot" onclick="toggleDay(this)"></div><div class="day-label">F</div></div>
    <div class="day-item"><div class="day-dot" onclick="toggleDay(this)"></div><div class="day-label">S</div></div>
    <div class="day-item"><div class="day-dot" onclick="toggleDay(this)"></div><div class="day-label">S</div></div>
  </div>

  <div class="ask-btn">
    <div class="ask-circle">💡</div>
    <div class="ask-label">Ask OyuMind...</div>
  </div>
</div>

<script>
  function selectMood(el) {
    document.querySelectorAll('.mood-emoji').forEach(e => e.style.outline = 'none');
    el.querySelector('.mood-emoji').style.outline = '3px solid #7c4dbd';
  }
  function toggleDay(el) { el.classList.toggle('done'); }
</script>
</body>
</html>
