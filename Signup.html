<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OyuMind – Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-card:      rgba(100,70,160,0.28);
      --purple-btn:   #7040c0;
      --input-bg:     rgba(180,150,220,0.15);
      --input-border: rgba(180,150,220,0.25);
      --text-white:   #ffffff;
      --text-soft:    #c8b8e8;
      --text-muted:   #8878a8;
    }
    body {
      min-height: 100vh;
      background: linear-gradient(160deg,#2a1060 0%,#12082e 100%);
      font-family: 'Nunito', sans-serif;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
    }
    .phone {
      width: 300px;
      background: linear-gradient(175deg,#1e1248 0%,#160e38 50%,#12082e 100%);
      border-radius: 36px;
      box-shadow: 0 30px 70px rgba(5,2,20,0.75), 0 0 0 1px rgba(255,255,255,0.06) inset;
      display: flex; flex-direction: column; align-items: center;
      padding: 28px 22px 24px;
      gap: 0;
    }

    /* Logo — mix-blend-mode removes the black background */
    .logo-wrap {
      width: 52px; height: 52px;
      margin-bottom: 6px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-wrap img {
      width: 100%; height: 100%;
      object-fit: contain;
      mix-blend-mode: lighten;
    }

    .app-name {
      font-weight: 800; font-size: 22px; color: #fff;
      letter-spacing: -0.3px; margin-bottom: 2px;
    }
    .app-sub {
      font-size: 11px; color: var(--text-soft); font-style: italic;
      margin-bottom: 16px; font-weight: 400;
    }

    /* Card */
    .card {
      width: 100%;
      background: var(--bg-card);
      border-radius: 18px;
      padding: 18px 16px 16px;
      border: 1px solid rgba(180,150,220,0.15);
      backdrop-filter: blur(10px);
      display: flex; flex-direction: column;
    }
    label {
      font-size: 11px; font-weight: 700; color: var(--text-soft);
      letter-spacing: 0.3px; margin-bottom: 5px; display: block;
    }
    input {
      width: 100%; padding: 10px 14px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 10px;
      color: #fff; font-family: 'Nunito', sans-serif;
      font-size: 13px; outline: none;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 12px;
    }
    input::placeholder { color: var(--text-muted); }
    input:focus { border-color: rgba(180,140,240,0.5); background: rgba(180,150,220,0.22); }

    /* Password row */
    .pw-wrap { position: relative; margin-bottom: 12px; }
    .pw-wrap input { margin-bottom: 0; padding-right: 40px; }
    .eye-btn {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 0;
      color: var(--text-muted); display: flex; align-items: center;
    }
    .eye-btn:hover { color: var(--text-soft); }
    .eye-btn svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }

    /* Strength */
    .str-bar { display: flex; gap: 3px; margin-bottom: 4px; }
    .str-bar span { flex:1; height:3px; border-radius:2px; background:rgba(180,150,220,0.2); transition: background 0.3s; }
    .str-bar.weak   span:nth-child(1)    { background:#e05555; }
    .str-bar.fair   span:nth-child(-n+2) { background:#e09a40; }
    .str-bar.good   span:nth-child(-n+3) { background:#60b87a; }
    .str-bar.strong span                 { background:#4cdf80; }

    .hint { font-size: 10px; font-weight: 600; min-height: 14px; margin-bottom: 10px; color: var(--text-muted); }
    .hint.err { color: #e05555; }
    .hint.ok  { color: #4cdf80; }

    .btn {
      width: 100%; padding: 13px;
      background: var(--purple-btn);
      border: none; border-radius: 12px;
      color: #fff; font-family: 'Nunito', sans-serif;
      font-weight: 700; font-size: 14px; cursor: pointer;
      margin-top: 2px;
      box-shadow: 0 6px 20px rgba(80,30,180,0.45);
      transition: transform 0.15s, background 0.15s;
    }
    .btn:hover { transform: translateY(-2px); background: #8050d0; }
    .btn:active { transform: translateY(1px); }

    .signin-link { margin-top: 14px; font-size: 12px; color: var(--text-muted); }
    .signin-link a { color: #a070e0; font-weight: 700; text-decoration: none; }
    .signin-link a:hover { color: #c090f8; }

    .tagline { margin-top: 14px; font-size: 10px; color: var(--text-muted); letter-spacing: 2px; }
    .tagline span { color: rgba(200,180,230,0.5); margin: 0 3px; }
  </style>
</head>

  <div class="app-name">OyuMind</div>
  <div class="app-sub">Study smarter, feel better</div>

  <div class="card">
    <label>First Name</label>
    <input type="text" placeholder="Enter your first name" autocomplete="given-name"/>

    <label>Last Name</label>
    <input type="text" placeholder="Enter your last name" autocomplete="family-name"/>

    <label>Email Address</label>
    <input type="email" placeholder="you@example.com" autocomplete="email"/>

    <label>Password</label>
    <div class="pw-wrap">
      <input type="password" id="pw" placeholder="Create a password" oninput="checkStr(this.value)"/>
      <button class="eye-btn" type="button" onclick="togglePw('pw',this)">
        <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <div class="str-bar" id="strBar"><span></span><span></span><span></span><span></span></div>
    <p class="hint" id="strLabel"></p>

    <label>Confirm Password</label>
    <div class="pw-wrap">
      <input type="password" id="cpw" placeholder="Repeat your password" oninput="checkMatch()"/>
      <button class="eye-btn" type="button" onclick="togglePw('cpw',this)">
        <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <p class="hint" id="matchHint"></p>

    <button class="btn" onclick="handleSignup()">Create Account</button>
  </div>

  <p class="signin-link">Already have an account? <a href="Login.html">Sign in</a></p>
  <p class="tagline">focus <span>•</span> balance <span>•</span> bloom</p>
  <button class="btn" onclick="location.href='Dashboard.html">Sign in</button>
</div>

<script>
  const eyeOff = '<svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
  const eyeOn  = '<svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';

  function togglePw(id, btn) {
    const el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
    btn.innerHTML = el.type === 'text' ? eyeOff : eyeOn;
  }

  function checkStr(val) {
    const bar = document.getElementById('strBar');
    const lbl = document.getElementById('strLabel');
    bar.className = 'str-bar';
    if (!val) { lbl.textContent=''; lbl.className='hint'; return; }
    let s = 0;
    if (val.length >= 8) s++;
    if (/[A-Z]/.test(val)) s++;
    if (/[0-9]/.test(val)) s++;
    if (/[^A-Za-z0-9]/.test(val)) s++;
    const cls   = ['','weak','fair','good','strong'];
    const names = ['','Weak','Fair','Good','Strong'];
    const cols  = ['','#e05555','#e09a40','#60b87a','#4cdf80'];
    if (s) bar.classList.add(cls[s]);
    lbl.textContent = names[s] || '';
    lbl.style.color = cols[s];
    checkMatch();
  }

  function checkMatch() {
    const pw=document.getElementById('pw').value;
    const cp=document.getElementById('cpw').value;
    const h=document.getElementById('matchHint');
    if (!cp) { h.textContent=''; h.className='hint'; return; }
    h.textContent = pw===cp ? '✓ Passwords match' : '✗ Passwords do not match';
    h.className   = pw===cp ? 'hint ok' : 'hint err';
  }

  function handleSignup() {
    const pw=document.getElementById('pw').value;
    const cp=document.getElementById('cpw').value;
    if (pw!==cp) { checkMatch(); return; }
    location.href='oyumind-verify.html';
  }
</script>
