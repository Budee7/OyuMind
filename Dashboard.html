<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OyuMind – Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #120828;
      font-family: 'Nunito', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ── Outer dark purple bezel (the border ring) ── */
    .bezel {
      background: #1e0f48;
      border-radius: 42px;
      padding: 10px;
      box-shadow: 0 30px 70px rgba(5,2,20,0.9);
    }

    /* ── Phone: dark top strip + big lilac body ── */
    .phone {
      width: 280px;
      border-radius: 34px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* TOP DARK STRIP — only logo + tagline */
    .top-dark {
      background: #1e1048;
      padding: 24px 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .topbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }
    .logo-img { width: 38px; height: auto; }
    .app-name {
      font-size: 23px;
      font-weight: 800;
      color: #fff;
      flex: 1;
    }
    .avatar {
      width: 33px; height: 33px;
      border-radius: 50%;
      background: rgba(200,180,240,0.18);
      border: 1.5px solid rgba(200,180,240,0.22);
      display: flex; align-items: center; justify-content: center;
      color: rgba(200,180,240,0.45);
      font-size: 15px;
    }
    .tagline {
      text-align: center;
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(180,160,220,0.5);
      font-weight: 500;
    }
    .tagline span { color: rgba(210,160,175,0.55); margin: 0 2px; }

    /* BIG LIGHT LILAC BODY — everything below top strip */
    .body-lilac {
      background: #d8cce8;
      flex: 1;
      padding: 16px 14px 26px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* ── TODAY'S TASKS card — white, floats on lilac ── */
    .tasks-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 16px 14px 14px;
      margin-bottom: 14px;
      box-shadow:
        0 6px 24px rgba(80,40,140,0.13),
        0 1px 4px rgba(80,40,140,0.08);
    }
    .tasks-title {
      font-size: 16px;
      font-weight: 800;
      color: #1e1040;
      text-align: center;
      margin-bottom: 12px;
    }
    .task-pill {
      width: 100%;
      background: #ece5f8;
      border: none;
      border-radius: 13px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 22px;
      font-weight: 300;
      color: #a898c8;
      margin-bottom: 9px;
      transition: background 0.18s;
    }
    .task-pill:last-child { margin-bottom: 0; }
    .task-pill:hover { background: #ddd4f0; }
    .task-pill.has-text {
      justify-content: flex-start;
      padding: 0 16px;
      font-size: 14px;
      font-weight: 600;
      color: #2a1a4e;
    }

    /* ── MOOD TRACKER card — white, floats on lilac ── */
    .mood-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 14px 14px 14px;
      margin-bottom: 18px;
      box-shadow:
        0 6px 24px rgba(80,40,140,0.13),
        0 1px 4px rgba(80,40,140,0.08);
    }
    .mood-title {
      font-size: 16px;
      font-weight: 800;
      color: #1e1040;
      margin-bottom: 11px;
    }
    .mood-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 0 2px;
    }
    .mood-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }
    .mood-img {
      width: 44px; height: 44px;
      object-fit: contain;
      filter: drop-shadow(0 2px 5px rgba(0,0,0,0.18));
      transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .mood-item:hover .mood-img,
    .mood-item.active .mood-img {
      transform: scale(1.18) translateY(-2px);
    }
    .mood-label {
      font-size: 10px;
      font-weight: 700;
      color: #8878a8;
    }

    /* ── WEEK ROW — on lilac bg ── */
    .week-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 4px;
      margin-bottom: 22px;
    }
    .day-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .day-dot {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 2px solid rgba(130,100,180,0.35);
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.18s;
    }
    .day-dot.done {
      background: #5cba6c;
      border-color: #5cba6c;
    }
    .day-dot.done::after {
      content: '✓';
      color: #fff;
      font-size: 12px;
      font-weight: 800;
    }
    .day-label {
      font-size: 10px;
      font-weight: 700;
      color: #7060a0;
    }

    /* ── ASK OYUMIND — on lilac bg ── */
    .ask-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      margin-top: auto;
    }
    .ask-circle {
      width: 50px; height: 50px;
      border-radius: 50%;
      background: #9070c8;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 4px 18px rgba(100,50,200,0.35);
      transition: transform 0.18s;
    }
    .ask-circle:hover { transform: scale(1.08); }
    .ask-label {
      font-size: 14px;
      font-weight: 700;
      color: #5040a0;
    }
  </style>
</head>
