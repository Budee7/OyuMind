<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OyuMind – Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-outer:#22144a;
  --bg-screen:#e8e2f5;
  --card:#ffffff;
  --pill:#ede8f5;
  --accent:#3b2368;
  --accent2:#6a35c9;
  --green:#4caf7d;
  --red:#e05c5c;
  --shadow:0 6px 24px rgba(60,30,110,0.10);
}
body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#d8d0ee;
  font-family:'Nunito',sans-serif;
  padding:32px 0;
}
.phone{
  width:320px;
  min-height: 640px;
  background:linear-gradient(170deg,#2d1b5e 0%,#1a0d42 100%);
  border-radius:44px;
  padding:20px 14px 24px;
  box-shadow:0 0 0 1px rgba(255,255,255,0.07),0 32px 80px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.09);
}
.notch{width:70px;height:5px;background:rgba(255,255,255,0.12);border-radius:3px;margin:0 auto 14px}
.screen{background:var(--bg-screen);border-radius:30px;overflow-y:auto;overflow-x:hidden;padding:0 0 20px;flex:1}
.screen::-webkit-scrollbar{width:0px}
/* HEADER */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 16px 8px;
}
.header-brand{display:flex;align-items:center;gap:8px}
.logo-img{width:48px;height:40px;object-fit:contain}
.brand-col{display:flex;flex-direction:column;line-height:1.1}
.brand-name{font-size:20px;font-weight:900;color:var(--accent)}
.tagline{font-size:9px;color:#9b88c5;letter-spacing:0.06em}
.avatar-btn{
  width:38px;height:38px;border-radius:50%;
  background:linear-gradient(145deg,#ddd5f0,#c8bde8);
  display:flex;align-items:center;justify-content:center;
  border:none;cursor:pointer;
}
.avatar-btn svg{width:22px;height:22px;color:#a899cc}

/* TASKS CARD */
.card{
  background:var(--card);
  border-radius:20px;
  margin:8px 10px;
  padding:16px 14px;
  box-shadow:var(--shadow);
}
.card-title{font-size:17px;font-weight:800;color:var(--accent);margin-bottom:12px}
.task-pill{
  background:var(--pill);
  border-radius:50px;
  padding:10px 16px;
  font-size:13px;font-weight:600;color:var(--accent);
  margin-bottom:8px;
  cursor:pointer;
  transition:background 0.15s,transform 0.12s;
}
.task-pill:hover{background:#ddd3f0;transform:translateX(3px)}

/* MOOD CARD */
.mood-card{
  background:var(--card);
  border-radius:20px;
  margin:0 10px 8px;
  padding:16px 14px;
  box-shadow:var(--shadow);
}
.mood-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.mood-title{font-size:17px;font-weight:800;color:var(--accent)}
.cal-btn{
  width:32px;height:32px;border-radius:50%;
  background:var(--pill);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.15s,transform 0.12s;
}
.cal-btn:hover{background:#ddd3f0;transform:scale(1.08)}
.cal-btn svg{width:16px;height:16px;color:var(--accent)}

.mood-emojis{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
  justify-items:center;
}
.mood-item{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  cursor:pointer;
}
.mood-ball{
  width:52px;height:52px;border-radius:50%;
  overflow:hidden;
  border:3px solid transparent;
  transition:transform 0.15s,border-color 0.15s,box-shadow 0.15s;
}
.mood-ball img{width:100%;height:100%;object-fit:cover}
.mood-ball:hover{transform:scale(1.1);box-shadow:0 4px 14px rgba(0,0,0,0.18)}
.mood-ball.selected{border-color:var(--accent2);box-shadow:0 4px 16px rgba(106,53,201,0.35)}
.mood-label{font-size:11px;font-weight:600;color:#7c6aaa}

/* WEEK TRACKER */
.week-track{
  display:flex;justify-content:space-around;align-items:center;
  padding:8px 14px 0;
}
.day-col{display:flex;flex-direction:column;align-items:center;gap:6px}
.day-circle{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:2px solid #c8bde8;
  font-size:14px;
  transition:all 0.2s;
  cursor:pointer;
}
.day-circle.done{background:var(--green);border-color:var(--green);}
.day-circle.done svg{display:block}
.day-circle.missed{background:var(--red);border-color:var(--red);color:white;font-weight:800;font-size:13px}
.day-circle.today{border-color:var(--accent2);border-width:2.5px}
.day-name{font-size:11px;font-weight:700;color:#9b88c5}

/* ASK SECTION */
.ask-section{
  display:flex;flex-direction:column;align-items:center;
  padding:18px 14px 4px;gap:8px;
}
.ask-btn{
  width:44px;height:44px;border-radius:50%;
  background:#a598c8;
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 12px rgba(100,70,180,0.25);
  transition:transform 0.15s;
}
.ask-btn:hover{transform:scale(1.07)}
.ask-text{font-size:17px;font-weight:800;color:var(--accent)}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card,.mood-card{animation:fadeUp 0.35s ease forwards}
</style>
</head>

<script>
const MOODS = ['angry','happy','sad','tired'];
const TODAY = new Date();
const todayKey = TODAY.toISOString().split('T')[0];

function getStorage() {
  try { return JSON.parse(localStorage.getItem('oyumind_moods') || '{}'); } catch { return {}; }
}
function setStorage(data) {
  localStorage.setItem('oyumind_moods', JSON.stringify(data));
}

function selectMood(mood) {
  // Remove all selected
  MOODS.forEach(m => document.getElementById('mood-' + m).classList.remove('selected'));
  document.getElementById('mood-' + mood).classList.add('selected');
  // Save today's mood
  const data = getStorage();
  data[todayKey] = mood;
  setStorage(data);
  renderWeek();
}

function renderWeek() {
  const data = getStorage();
  const days = ['M','T','W','T','F','S','S'];
  const container = document.getElementById('weekTrack');
  container.innerHTML = '';

  // Find Monday of current week
  const dayOfWeek = TODAY.getDay(); // 0=Sun
  const mondayOffset = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
  const monday = new Date(TODAY);
  monday.setDate(TODAY.getDate() + mondayOffset);

  days.forEach((d, i) => {
    const date = new Date(monday);
    date.setDate(monday.getDate() + i);
    const key = date.toISOString().split('T')[0];
    const isPast = date < new Date(todayKey);
    const isToday = key === todayKey;
    const mood = data[key];

    const col = document.createElement('div');
    col.className = 'day-col';

    const circle = document.createElement('div');
    circle.className = 'day-circle';
    if (isToday) circle.classList.add('today');

    if (mood) {
      circle.classList.add('done');
      circle.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
    } else if (isPast) {
      circle.classList.add('missed');
      circle.textContent = '✕';
    }

    const label = document.createElement('div');
    label.className = 'day-name';
    label.textContent = d;

    col.appendChild(circle);
    col.appendChild(label);
    container.appendChild(col);
  });

  // Restore selected mood for today
  const todayMood = data[todayKey];
  if (todayMood) {
    document.getElementById('mood-' + todayMood)?.classList.add('selected');
  }
}
let tasks = [];

function addTask() {
  const name = prompt('Enter task name:');
  if (!name) return;
  tasks.push(name);
  renderTasks();
}

function renderTasks() {
  const list = document.getElementById('task-list');
  list.innerHTML = '';
  tasks.forEach((t, i) => {
    const pill = document.createElement('div');
    pill.className = 'task-pill';
    pill.textContent = t;
    list.appendChild(pill);
  });
}
renderWeek();
</script>
