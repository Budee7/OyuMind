<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OyuBloom</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  background:#1a0d42;
  font-family:'Nunito',sans-serif;
  padding:32px 0;
}
.phone{
  width:300px;height:680px;
  background:linear-gradient(160deg,#3a2570 0%,#251550 40%,#1a0d42 100%);
  border-radius:44px;
  padding:20px 16px 24px;
  box-shadow:0 0 0 1px rgba(255,255,255,0.08),0 32px 80px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.1);
  display:flex;flex-direction:column;align-items:center;
  position:relative;overflow:hidden;
}
.phone::before{
  content:'';position:absolute;
  width:260px;height:260px;
  background:radial-gradient(circle,rgba(120,80,220,0.18) 0%,transparent 70%);
  top:140px;left:50%;transform:translateX(-50%);
  pointer-events:none;
}
.notch{width:68px;height:5px;background:rgba(255,255,255,0.12);border-radius:3px;margin:0 auto 14px;flex-shrink:0}
.title{font-size:26px;font-weight:900;color:#fff;letter-spacing:0.01em;margin-bottom:14px;text-shadow:0 2px 20px rgba(160,100,255,0.4);flex-shrink:0}

/* Lotus circle */
.lotus-wrap{
  width:170px;height:170px;border-radius:50%;
  background:rgba(80,50,160,0.35);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:14px;
  box-shadow:0 4px 30px rgba(100,60,200,0.25),inset 0 1px 0 rgba(255,255,255,0.08);
  flex-shrink:0;
}
#lotusSvg{width:130px;height:110px}

/* Timer display */
.timer-display{
  font-size:42px;font-weight:900;color:#c8a8ff;
  letter-spacing:0.05em;margin-bottom:12px;
  font-variant-numeric:tabular-nums;
  text-shadow:0 2px 16px rgba(180,120,255,0.5);
  flex-shrink:0;
}

/* ── Drum Picker ── */
.drum-picker{
  display:flex;align-items:center;justify-content:center;
  gap:0;margin-bottom:12px;
  background:rgba(80,50,160,0.3);
  border-radius:16px;padding:0 10px;
  flex-shrink:0;
}
.drum-col{display:flex;flex-direction:column;align-items:center;width:52px}
.drum-lbl{
  font-size:9px;font-weight:800;
  color:rgba(200,170,255,0.6);
  letter-spacing:1.5px;text-transform:uppercase;
  padding:5px 0 2px;
}
.drum-scroll{
  height:100px;overflow:hidden;position:relative;
  width:52px;cursor:ns-resize;user-select:none;touch-action:none;
}
.drum-scroll::before,.drum-scroll::after{
  content:'';position:absolute;left:0;right:0;height:32px;z-index:2;pointer-events:none;
}
.drum-scroll::before{top:0;background:linear-gradient(to bottom,rgba(50,25,100,1),rgba(50,25,100,0))}
.drum-scroll::after{bottom:0;background:linear-gradient(to top,rgba(50,25,100,1),rgba(50,25,100,0))}
.drum-hl{
  position:absolute;left:3px;right:3px;
  top:50%;transform:translateY(-50%);
  height:32px;background:rgba(160,120,255,0.15);
  border-radius:8px;pointer-events:none;z-index:1;
  border-top:1.5px solid rgba(160,120,255,0.35);
  border-bottom:1.5px solid rgba(160,120,255,0.35);
}
.drum-inner{display:flex;flex-direction:column;align-items:center;will-change:transform;}
.drum-item{
  height:32px;line-height:32px;width:52px;
  text-align:center;font-size:20px;font-weight:900;
  color:#e0d0ff;font-family:'Nunito',sans-serif;
  font-variant-numeric:tabular-nums;flex-shrink:0;
}
.drum-item.dim{color:rgba(200,170,255,0.25);font-size:13px;font-weight:600}
.drum-item.near{color:rgba(200,170,255,0.55);font-size:16px}
.drum-sep{font-size:22px;font-weight:900;color:#a880e0;line-height:100px;margin-top:16px;flex-shrink:0}

/* Buttons */
.btn-start{
  padding:11px 36px;
  background:linear-gradient(135deg,#7c4dbd,#5a28a0);
  color:white;border-radius:50px;border:none;cursor:pointer;
  font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;
  box-shadow:0 4px 18px rgba(100,50,200,0.4);
  transition:transform 0.14s,box-shadow 0.14s;
  margin-bottom:14px;flex-shrink:0;
}
.btn-start:hover{transform:scale(1.04);box-shadow:0 6px 24px rgba(100,50,200,0.55)}
.btn-row{display:flex;gap:12px;margin-bottom:14px;flex-shrink:0}
.ctrl-btn{
  padding:10px 20px;border-radius:50px;border:none;cursor:pointer;
  font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;
  display:flex;align-items:center;gap:6px;
  transition:transform 0.14s;
}
.ctrl-btn:hover{transform:scale(1.05)}
.btn-pause{background:rgba(120,90,200,0.5);color:#e0d0ff;border:1.5px solid rgba(160,120,255,0.3)}
.btn-giveup{background:rgba(180,80,80,0.35);color:#ffcccc;border:1.5px solid rgba(255,120,120,0.3)}

/* Ask */
.ask-section{display:flex;flex-direction:column;align-items:center;gap:5px;margin-top:auto;flex-shrink:0}
.ask-circle{
  width:40px;height:40px;border-radius:50%;
  background:rgba(120,90,200,0.45);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform 0.14s;
}
.ask-circle:hover{transform:scale(1.07)}
.ask-circle svg{width:20px;height:20px;stroke:white;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.ask-label{font-size:13px;font-weight:800;color:rgba(255,255,255,0.8)}

/* Overlays */
.complete-overlay{
  position:absolute;inset:0;background:rgba(20,8,50,0.92);
  border-radius:44px;display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;z-index:10;
}
.complete-overlay.show{display:flex}
.complete-msg{font-size:22px;font-weight:900;color:#e0c8ff;text-align:center;padding:0 24px}
.complete-sub{font-size:12px;font-weight:600;color:rgba(200,170,255,0.7);text-align:center;padding:0 28px;line-height:1.6}
.complete-btn{
  padding:12px 32px;background:linear-gradient(135deg,#7c4dbd,#5a28a0);
  color:white;border-radius:50px;border:none;cursor:pointer;
  font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;
  box-shadow:0 4px 18px rgba(100,50,200,0.4);transition:transform 0.14s;
}
.complete-btn:hover{transform:scale(1.04)}
.block-overlay{
  position:fixed;inset:0;background:rgba(10,5,30,0.95);
  z-index:9999;display:none;
  align-items:center;justify-content:center;
  flex-direction:column;gap:14px;
}
.block-overlay.show{display:flex}
.block-text{font-size:16px;font-weight:800;color:rgba(200,160,255,0.9);text-align:center;padding:0 32px;line-height:1.6}
.block-return{
  padding:10px 28px;background:rgba(120,80,200,0.5);
  color:#e0d0ff;border:1.5px solid rgba(160,120,255,0.3);
  border-radius:50px;font-family:'Nunito',sans-serif;
  font-weight:700;font-size:13px;cursor:pointer;
}
</style>
</head>
<body>

<div class="block-overlay" id="blockOverlay">
  <div style="font-size:48px">🌸</div>
  <div class="block-text">OyuBloom is active.<br/>Stay focused and finish your session!</div>
  <button class="block-return" onclick="returnToBloom()">Return to OyuBloom</button>
</div>

<div class="phone">
  <div class="notch"></div>
  <div class="title">OyuBloom</div>

  <!-- Lotus -->
  <div class="lotus-wrap">
    <svg id="lotusSvg" viewBox="0 0 160 130" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- center flame: deep salmon top to rose base -->
        <linearGradient id="gc" x1="80" y1="20" x2="80" y2="82" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#f2a080"/><stop offset="100%" stop-color="#d85858"/>
        </linearGradient>
        <!-- inner petals -->
        <linearGradient id="gi" x1="80" y1="30" x2="80" y2="82" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#f0b090"/><stop offset="100%" stop-color="#e07070"/>
        </linearGradient>
        <!-- mid petals -->
        <linearGradient id="gm" x1="80" y1="35" x2="80" y2="82" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#f4b8a8"/><stop offset="100%" stop-color="#e08080"/>
        </linearGradient>
        <!-- outer petals -->
        <linearGradient id="go" x1="80" y1="45" x2="80" y2="82" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#f6c0b0"/><stop offset="100%" stop-color="#e89090"/>
        </linearGradient>
        <!-- far petals -->
        <linearGradient id="gf" x1="80" y1="55" x2="80" y2="82" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#f8cac0"/><stop offset="100%" stop-color="#eca0a0"/>
        </linearGradient>
      </defs>

      <!-- ── BOOK BASE (always visible) ── -->
      <!-- left page -->
      <path d="M80 78 Q50 72 18 78 L18 90 Q50 84 80 88 Z" fill="#c8c0a8" opacity="0.5"/>
      <!-- right page -->
      <path d="M80 78 Q110 72 142 78 L142 90 Q110 84 80 88 Z" fill="#c8c0a8" opacity="0.45"/>
      <!-- book spine/bottom green band -->
      <path d="M22 88 Q80 82 138 88 L136 95 Q80 89 24 95 Z" fill="#6a9a72" opacity="0.95"/>
      <path d="M24 95 Q80 89 136 95 L134 100 Q80 94 26 100 Z" fill="#587a60" opacity="0.85"/>
      <!-- center spine -->
      <path d="M76 78 Q80 75 84 78 L84 95 Q80 93 76 95 Z" fill="#587a60" opacity="0.7"/>

      <!-- ── STAGE 1: tiny center flame bud ── -->
      <g id="p1" style="opacity:0;transition:opacity 1.4s ease">
        <path d="M80 30 C78 46 77 62 80 78 C83 62 82 46 80 30Z" fill="url(#gc)"/>
      </g>

      <!-- ── STAGE 2: left inner petal ── -->
      <g id="p2" style="opacity:0;transition:opacity 1.4s ease">
        <path d="M80 78 C72 68 60 56 55 42 C62 54 72 66 80 78Z" fill="url(#gi)"/>
      </g>

      <!-- ── STAGE 3: right inner petal ── -->
      <g id="p3" style="opacity:0;transition:opacity 1.4s ease">
        <path d="M80 78 C88 68 100 56 105 42 C98 54 88 66 80 78Z" fill="url(#gi)"/>
      </g>

      <!-- ── STAGE 4: second left petal (wider) ── -->
      <g id="p4" style="opacity:0;transition:opacity 1.4s ease">
        <path d="M80 78 C68 70 50 62 40 48 C50 58 66 68 80 78Z" fill="url(#gm)"/>
      </g>

      <!-- ── STAGE 5: second right petal (wider) ── -->
      <g id="p5" style="opacity:0;transition:opacity 1.4s ease">
        <path d="M80 78 C92 70 110 62 120 48 C110 58 94 68 80 78Z" fill="url(#gm)"/>
      </g>

      <!-- ── STAGE 6: outer left petal (sweeping) ── -->
      <g id="p6" style="opacity:0;transition:opacity 1.4s ease">
        <path d="M80 78 C62 72 38 68 24 56 C38 63 60 70 80 78Z" fill="url(#go)"/>
      </g>

      <!-- ── STAGE 7: outer right petal (sweeping) ── -->
      <g id="p7" style="opacity:0;transition:opacity 1.4s ease">
        <path d="M80 78 C98 72 122 68 136 56 C122 63 100 70 80 78Z" fill="url(#go)"/>
      </g>

      <!-- ── STAGE 8: far left flat petal ── -->
      <g id="p8" style="opacity:0;transition:opacity 1.4s ease">
        <path d="M80 78 C56 76 28 76 14 67 C28 71 55 74 80 78Z" fill="url(#gf)"/>
      </g>

      <!-- ── STAGE 9: far right flat petal + golden center glow ── -->
      <g id="p9" style="opacity:0;transition:opacity 1.4s ease">
        <path d="M80 78 C104 76 132 76 146 67 C132 71 105 74 80 78Z" fill="url(#gf)"/>
        <circle cx="80" cy="74" r="7" fill="#ffd090" opacity="0.6"/>
        <circle cx="80" cy="74" r="4" fill="#ffb860" opacity="0.5"/>
      </g>
    </svg>
  </div>

  <!-- Timer display -->
  <div class="timer-display" id="timerDisplay">00:00</div>

  <!-- Drum picker -->
  <div class="drum-picker" id="drumPicker">
    <div class="drum-col">
      <div class="drum-lbl">HRS</div>
      <div class="drum-scroll" id="ds-h">
        <div class="drum-hl"></div>
        <div class="drum-inner" id="di-h"></div>
      </div>
    </div>
    <div class="drum-sep">:</div>
    <div class="drum-col">
      <div class="drum-lbl">MIN</div>
      <div class="drum-scroll" id="ds-m">
        <div class="drum-hl"></div>
        <div class="drum-inner" id="di-m"></div>
      </div>
    </div>
    <div class="drum-sep">:</div>
    <div class="drum-col">
      <div class="drum-lbl">SEC</div>
      <div class="drum-scroll" id="ds-s">
        <div class="drum-hl"></div>
        <div class="drum-inner" id="di-s"></div>
      </div>
    </div>
  </div>

  <!-- Start button -->
  <button class="btn-start" id="startBtn" onclick="startBloom()">Start OyuBloom</button>

  <!-- Pause/Give up (hidden initially) -->
  <div class="btn-row" id="btnRow" style="display:none">
    <button class="ctrl-btn btn-pause" id="pauseBtn" onclick="togglePause()">Pause ⏸</button>
    <button class="ctrl-btn btn-giveup" onclick="giveUp()">Give up ✕</button>
  </div>

  <!-- Ask -->
  <div class="ask-section">
    <button class="ask-circle">
      <svg viewBox="0 0 24 24"><path d="M9 18h6M10 21h4M12 2a7 7 0 0 1 7 7c0 2.8-1.6 5.2-4 6.5V17H9v-1.5C6.6 14.2 5 11 5 9a7 7 0 0 1 7-7z"/></svg>
    </button>
    <span class="ask-label">Ask OyuMind...</span>
  </div>

  <!-- Complete overlay -->
  <div class="complete-overlay" id="completeOverlay">
    <div style="font-size:52px">🌸</div>
    <div class="complete-msg">Bloom Complete!</div>
    <div class="complete-sub">You stayed focused and your lotus has fully bloomed. Amazing work! 🌺</div>
    <button class="complete-btn" onclick="resetBloom()">Done</button>
  </div>
</div>

<script>
const IH = 32; // item height
const PETALS = 9;
const dv = {h:0, m:25, s:0}; // default 25 min
let duration=0, elapsed=0, paused=false, running=false, interval=null, visHandler=null;

// ── Build drums ──
function buildDrum(unit) {
  const max = unit==='h'?23:59;
  const inner = document.getElementById('di-'+unit);
  inner.innerHTML = '';
  for(let i=0;i<2;i++) addPad(inner);
  for(let i=0;i<=max;i++) {
    const d=document.createElement('div');
    d.className='drum-item'; d.dataset.val=i;
    d.textContent=String(i).padStart(2,'0');
    inner.appendChild(d);
  }
  for(let i=0;i<2;i++) addPad(inner);
  updatePos(unit,false);
  initDrum(unit);
}
function addPad(parent) {
  const d=document.createElement('div');
  d.className='drum-item dim';
  d.style.opacity='0'; d.dataset.val='-1';
  d.style.height=IH+'px';
  parent.appendChild(d);
}
function updatePos(unit,animate) {
  const val=dv[unit];
  const inner=document.getElementById('di-'+unit);
  if(!inner)return;
  const offset=(val+2)*IH-(100/2-IH/2);
  inner.style.transition=animate?'transform 0.12s cubic-bezier(0.25,0.46,0.45,0.94)':'none';
  inner.style.transform=`translateY(${-offset}px)`;
  inner.querySelectorAll('.drum-item[data-val]').forEach(el=>{
    const v=parseInt(el.dataset.val); if(v<0)return;
    const d=Math.abs(v-val);
    el.classList.remove('dim','near');
    if(d===1)el.classList.add('near');
    else if(d>1)el.classList.add('dim');
  });
}
function initDrum(unit) {
  const scroll=document.getElementById('ds-'+unit);
  if(!scroll)return;
  let sY=0,sV=0,dragging=false,vel=0,lY=0,lT=0;
  const max=()=>unit==='h'?23:59;
  const set=v=>{ dv[unit]=Math.max(0,Math.min(max(),Math.round(v))); updatePos(unit,true); };
  scroll.addEventListener('mousedown',e=>{sY=e.clientY;sV=dv[unit];lY=e.clientY;lT=Date.now();vel=0;dragging=true;e.preventDefault();});
  scroll.addEventListener('touchstart',e=>{sY=e.touches[0].clientY;sV=dv[unit];lY=sY;lT=Date.now();vel=0;dragging=true;},{passive:true});
  window.addEventListener('mousemove',e=>{
    if(!dragging)return;
    const now=Date.now();vel=(lY-e.clientY)/(now-lT+1);lY=e.clientY;lT=now;
    set(sV+(sY-e.clientY)/IH);
  });
  window.addEventListener('touchmove',e=>{
    if(!dragging)return;
    const now=Date.now();vel=(lY-e.touches[0].clientY)/(now-lT+1);lY=e.touches[0].clientY;lT=now;
    set(sV+(sY-lY)/IH);
  },{passive:true});
  const end=()=>{if(!dragging)return;dragging=false;if(Math.abs(vel)>0.3)set(dv[unit]+vel*5);};
  window.addEventListener('mouseup',end);
  window.addEventListener('touchend',end);
  scroll.addEventListener('wheel',e=>{e.preventDefault();set(dv[unit]+Math.sign(e.deltaY));},{passive:false});
}

['h','m','s'].forEach(buildDrum);

// ── Timer ──
function pad(n){return String(n).padStart(2,'0');}
function updateTimer(){
  const rem=Math.max(0,duration-elapsed);
  const h=Math.floor(rem/3600),m=Math.floor((rem%3600)/60),s=rem%60;
  document.getElementById('timerDisplay').textContent=
    h>0 ? `${pad(h)}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
}
function updateLotus(){
  const prog=Math.min(elapsed/duration,1);
  const show=Math.floor(prog*PETALS);
  for(let i=1;i<=PETALS;i++){
    const el=document.getElementById('p'+i);
    if(el) el.style.opacity = i<=show?'1':'0';
  }
}
function startBloom(){
  const h=dv.h,m=dv.m,s=dv.s;
  duration=h*3600+m*60+s;
  if(duration<=0){alert('Please set a time first!');return;}
  running=true;paused=false;elapsed=0;
  document.getElementById('drumPicker').style.display='none';
  document.getElementById('startBtn').style.display='none';
  document.getElementById('btnRow').style.display='flex';
  updateTimer();
  visHandler=()=>{
    if(document.hidden&&running&&!paused)
      document.getElementById('blockOverlay').classList.add('show');
  };
  document.addEventListener('visibilitychange',visHandler);
  window.history.pushState(null,'',window.location.href);
  window.onpopstate=()=>{
    window.history.pushState(null,'',window.location.href);
    if(running&&!paused) document.getElementById('blockOverlay').classList.add('show');
  };
  interval=setInterval(tick,1000);
}
function tick(){
  if(paused)return;
  elapsed++;
  updateTimer();
  updateLotus();
  if(elapsed>=duration) finishBloom();
}
function togglePause(){
  paused=!paused;
  const btn=document.getElementById('pauseBtn');
  if(paused){btn.textContent='Resume ▶';btn.style.background='rgba(60,160,100,0.4)';btn.style.color='#b0ffd0';}
  else{btn.textContent='Pause ⏸';btn.style.background='';btn.style.color='';}
}
function giveUp(){
  clearInterval(interval);running=false;
  document.removeEventListener('visibilitychange',visHandler);
  document.getElementById('blockOverlay').classList.remove('show');
  document.getElementById('btnRow').style.display='none';
  document.getElementById('drumPicker').style.display='flex';
  document.getElementById('startBtn').style.display='block';
  elapsed=0;updateTimer();
  for(let i=1;i<=PETALS;i++){
    const el=document.getElementById('p'+i);
    if(el){el.style.opacity='0';el.style.transition='';}
  }
}
function finishBloom(){
  clearInterval(interval);running=false;
  document.removeEventListener('visibilitychange',visHandler);
  document.getElementById('blockOverlay').classList.remove('show');
  for(let i=1;i<=PETALS;i++){
    const el=document.getElementById('p'+i);
    if(el) el.style.opacity='1';
  }
  setTimeout(()=>document.getElementById('completeOverlay').classList.add('show'),1500);
}
function resetBloom(){
  document.getElementById('completeOverlay').classList.remove('show');
  document.getElementById('btnRow').style.display='none';
  document.getElementById('drumPicker').style.display='flex';
  document.getElementById('startBtn').style.display='block';
  elapsed=0;updateTimer();
  for(let i=1;i<=PETALS;i++){
    const el=document.getElementById('p'+i);
    if(el){el.style.opacity='0';el.style.transition='';}
  }
}
function returnToBloom(){
  document.getElementById('blockOverlay').classList.remove('show');
}

updateTimer();
</script>
</body>
</html>
