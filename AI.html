<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>OyuMind AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;background:#120828;
      font-family:'Nunito',sans-serif;
      display:flex;align-items:center;justify-content:center;padding:20px;
    }
    .bezel{
      background:#1e0f48;border-radius:42px;padding:10px;
      box-shadow:0 30px 70px rgba(5,2,20,0.9);
    }
    .phone{
      width:280px;height:600px;border-radius:34px;overflow:hidden;
      display:flex;flex-direction:column;
      background:linear-gradient(175deg,#1e1248,#130a30);
    }

    /* ── TOP BAR ── */
    .topbar{
      background:#1e1048;
      padding:22px 16px 12px;
      display:flex;align-items:center;gap:10px;
      flex-shrink:0;
    }
    .back-btn{
      width:30px;height:30px;border-radius:50%;
      background:rgba(200,180,240,0.15);border:1px solid rgba(200,180,240,0.2);
      color:rgba(200,180,240,0.7);font-size:14px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:background 0.18s;flex-shrink:0;
    }
    .back-btn:hover{background:rgba(200,180,240,0.25)}
    .brand{display:flex;flex-direction:column;flex:1}
    .brand-name{
      font-size:16px;font-weight:800;color:#fff;
      display:flex;align-items:center;gap:6px;
    }
    .brand-logo{width:22px;height:auto}
    .brand-sub{font-size:9px;letter-spacing:2px;color:rgba(180,160,220,0.5);margin-top:1px}

    /* ── QUICK ACTIONS ── */
    .quick-wrap{
      padding:12px 14px 8px;display:flex;flex-wrap:wrap;gap:8px;flex-shrink:0;
    }
    .quick-btn{
      background:rgba(160,120,220,0.2);
      border:1px solid rgba(180,150,230,0.25);
      border-radius:20px;padding:7px 14px;
      color:rgba(220,200,255,0.85);
      font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;
      cursor:pointer;transition:background 0.18s,transform 0.15s;
    }
    .quick-btn:hover{background:rgba(160,120,220,0.35);transform:translateY(-1px)}
    .quick-btn:active{transform:scale(0.96)}

    /* ── CHAT AREA ── */
    .chat-area{
      flex:1;overflow-y:auto;
      padding:10px 12px;
      display:flex;flex-direction:column;gap:10px;
      scroll-behavior:smooth;
    }
    .chat-area::-webkit-scrollbar{width:3px}
    .chat-area::-webkit-scrollbar-thumb{background:rgba(160,120,220,0.3);border-radius:99px}

    /* empty state */
    .empty-state{
      flex:1;display:flex;align-items:flex-end;justify-content:center;
      padding-bottom:10px;
    }
    .empty-state p{
      font-size:11px;letter-spacing:1px;
      color:rgba(160,140,200,0.4);text-align:center;
    }

    /* bubbles */
    .bubble-wrap{
      display:flex;flex-direction:column;max-width:85%;
      animation:bubIn 0.25s ease;
    }
    @keyframes bubIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .bubble-wrap.user{align-self:flex-end;align-items:flex-end}
    .bubble-wrap.ai{align-self:flex-start;align-items:flex-start}

    .bubble{
      border-radius:18px;padding:10px 13px;
      font-size:13px;line-height:1.55;white-space:pre-wrap;
    }
    .bubble.user{
      background:#6b38bc;color:#fff;
      border-bottom-right-radius:5px;
      box-shadow:0 4px 14px rgba(80,30,180,0.4);
    }
    .bubble.ai{
      background:#f0eaff;color:#1e1040;
      border-bottom-left-radius:5px;
      box-shadow:0 2px 10px rgba(80,40,140,0.12);
    }

    /* typing dots */
    .typing{
      background:#f0eaff;border-radius:18px;border-bottom-left-radius:5px;
      padding:11px 16px;display:flex;gap:5px;align-items:center;
      box-shadow:0 2px 10px rgba(80,40,140,0.12);
      align-self:flex-start;
    }
    .dot{
      width:7px;height:7px;border-radius:50%;background:#7c4dbd;
      animation:bounce 1.2s infinite;
    }
    .dot:nth-child(2){animation-delay:0.2s}
    .dot:nth-child(3){animation-delay:0.4s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

    /* ── INPUT BAR ── */
    .input-bar{
      padding:8px 12px 16px;flex-shrink:0;
      display:flex;gap:8px;align-items:center;
      background:linear-gradient(to top,rgba(15,8,40,0.9),transparent);
    }
    .msg-input{
      flex:1;background:rgba(160,130,210,0.18);
      border:1px solid rgba(170,140,220,0.25);border-radius:22px;
      padding:10px 15px;color:#fff;
      font-family:'Nunito',sans-serif;font-size:13px;outline:none;
      transition:border-color 0.2s,background 0.2s;
    }
    .msg-input::placeholder{color:rgba(170,150,210,0.45)}
    .msg-input:focus{border-color:rgba(180,140,240,0.5);background:rgba(160,130,210,0.28)}
    .send-btn{
      background:#6b38bc;border:none;border-radius:18px;
      padding:9px 16px;color:#fff;
      font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;
      cursor:pointer;flex-shrink:0;
      box-shadow:0 4px 14px rgba(80,30,180,0.4);
      transition:transform 0.15s,box-shadow 0.15s,opacity 0.15s;
    }
    .send-btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(80,30,180,0.55)}
    .send-btn:disabled{opacity:0.45;cursor:not-allowed;transform:none}
  </style>
</head>

  <!-- Quick action pills -->
  <div class="quick-wrap" id="quick-wrap">
    <button class="quick-btn" onclick="quickSend('Help me with my study plan')">&#128218; Study help</button>
    <button class="quick-btn" onclick="quickSend('Quiz me on a topic')">&#129504; Quiz me</button>
    <button class="quick-btn" onclick="quickSend('I am feeling stressed about studying, can you help me?')">&#128543; Feeling stressed</button>
  </div>

  <!-- Chat messages -->
  <div class="chat-area" id="chat-area">
    <div class="empty-state" id="empty-state">
      <p>OyuMind AI for your assistance</p>
    </div>
  </div>

  <!-- Input bar -->
  <div class="input-bar">
    <input class="msg-input" id="msg-input" type="text"
      placeholder="e.g., I need a study plan&#8230;"
      onkeydown="if(event.key==='Enter')sendMessage()"/>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">Send</button>
  </div>

</div></div>

<script>
const SYSTEM = `You are OyuMind AI, a warm, encouraging study assistant inside the OyuMind app for students.

You help with:
- Study planning and time management
- Explaining academic subjects (math, science, history, language, etc.)
- Quizzing students on chosen topics
- Coping with study stress and burnout
- Breaking down hard concepts simply

Quiz flow: ask topic first → ask difficulty (Easy / Medium / Hard / Mixed) → one question at a time with feedback.
Keep responses concise and mobile-friendly. Use short paragraphs or numbered lists. Be warm and motivating.`;

const messages = [];
let loading = false;

function hideEmpty() {
  const e = document.getElementById('empty-state');
  if (e) e.remove();
  document.getElementById('quick-wrap').style.display = 'none';
}

function addBubble(role, text) {
  hideEmpty();
  const chat = document.getElementById('chat-area');
  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap ' + role;
  const b = document.createElement('div');
  b.className = 'bubble ' + role;
  b.textContent = text;
  wrap.appendChild(b);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  hideEmpty();
  const chat = document.getElementById('chat-area');
  const t = document.createElement('div');
  t.id = 'typing';
  t.className = 'typing';
  t.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  chat.appendChild(t);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  document.getElementById('typing')?.remove();
}

async function quickSend(text) {
  await send(text);
}

async function sendMessage() {
  const inp = document.getElementById('msg-input');
  const text = inp.value.trim();
  if (!text || loading) return;
  inp.value = '';
  await send(text);
}

async function send(text) {
  if (loading) return;
  loading = true;
  document.getElementById('send-btn').disabled = true;

  addBubble('user', text);
  messages.push({role:'user', content:text});
  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM,
        messages: messages
      })
    });
    const data = await res.json();
    removeTyping();
    const reply = data?.content?.[0]?.text || 'Sorry, something went wrong. Please try again.';
    messages.push({role:'assistant', content:reply});
    addBubble('ai', reply);
  } catch(err) {
    removeTyping();
    addBubble('ai', 'Connection error. Please check your network and try again.');
  }

  loading = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('msg-input').focus();
}
</script>
