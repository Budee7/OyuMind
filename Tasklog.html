<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OyuMind – Task Log</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#e4ddf0;
  --card:#ffffff;
  --pill:#e0d4f0;
  --pill-hover:#d0c0e8;
  --purple:#6a35c9;
  --purple-dark:#3b2368;
  --purple-mid:#8a50d0;
  --text-dark:#2a1a4e;
  --text-mid:#6040a0;
  --text-muted:#9880b8;
}
body{
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  background:#d0c8e8;
  font-family:'Nunito',sans-serif;
  padding:32px 0;
}

/* ── Phone ── */
.phone{
  width:310px;
  height:680px;
  background:linear-gradient(170deg,#2d1b5e 0%,#1a0d42 100%);
  border-radius:44px;
  padding:20px 14px 24px;
  box-shadow:0 0 0 1px rgba(255,255,255,0.07),0 32px 80px rgba(0,0,0,0.5);
  display:flex;
  flex-direction:column;
}
.notch{width:68px;height:5px;background:rgba(255,255,255,0.12);border-radius:3px;margin:0 auto 12px}

/* ── Screen ── */
.screen{
  background:var(--bg);
  border-radius:28px;
  overflow-y:auto;
  overflow-x:hidden;
  flex:1;
  padding-bottom:18px;
}
.screen::-webkit-scrollbar{width:0px}

/* ── Header ── */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 16px 6px;
}
.header-brand{display:flex;align-items:center;gap:8px}
.logo-img{width:46px;height:38px;object-fit:contain}
.brand-name{font-size:22px;font-weight:900;color:var(--text-dark)}
.brand-name span{color:var(--purple)}

.tagline{text-align:center;font-size:9.5px;color:var(--text-muted);letter-spacing:0.12em;padding:0 0 10px}

/* ── Main card ── */
.card{
  background:var(--card);
  border-radius:22px;
  margin:0 10px 10px;
  padding:16px 14px 14px;
  box-shadow:0 4px 20px rgba(80,40,140,0.10);
}
.card-title{
  font-size:18px;font-weight:900;
  color:var(--text-dark);
  text-align:center;
  margin-bottom:12px;
}
.back-row{
  display:flex;align-items:center;gap:10px;
  margin-bottom:14px;
}
.back-btn{
  width:30px;height:30px;border-radius:50%;
  background:var(--pill);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.15s;flex-shrink:0;
}
.back-btn:hover{background:var(--pill-hover)}
.back-btn svg{width:14px;height:14px;color:var(--purple)}
.subject-name{font-size:15px;font-weight:800;color:var(--text-dark)}

/* ── Task item ── */
.task-list{display:flex;flex-direction:column;gap:10px}
.task-item{
  background:var(--pill);
  border-radius:18px;
  padding:12px 12px 12px;
}
.task-name-input{
  width:100%;background:transparent;border:none;
  border-bottom:1.5px solid rgba(124,77,189,0.25);
  outline:none;
  font-size:13px;font-weight:600;color:var(--text-dark);
  font-family:'Nunito',sans-serif;
  padding-bottom:4px;margin-bottom:12px;
}
.task-name-input::placeholder{color:var(--text-muted);font-weight:600}

/* ── Simple digital timer display ── */
.timer-display{
  display:flex;align-items:flex-end;justify-content:center;
  gap:0;margin-bottom:10px;
}
.timer-unit{
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.timer-unit-label{
  font-size:9px;font-weight:800;color:var(--text-muted);
  letter-spacing:1.5px;text-transform:uppercase;
}
.timer-digits{
  display:flex;gap:1px;
}
.drum-scroll-wrap{
  height:90px;overflow:hidden;position:relative;
  cursor:ns-resize;user-select:none;touch-action:none;
  width:38px;
}
.drum-scroll-wrap::before,
.drum-scroll-wrap::after{
  content:'';position:absolute;left:0;right:0;height:28px;z-index:2;pointer-events:none;
}
.drum-scroll-wrap::before{top:0;background:linear-gradient(to bottom,rgba(224,212,240,1),rgba(224,212,240,0))}
.drum-scroll-wrap::after{bottom:0;background:linear-gradient(to top,rgba(224,212,240,1),rgba(224,212,240,0))}
.drum-highlight{
  position:absolute;left:2px;right:2px;
  top:50%;transform:translateY(-50%);
  height:30px;background:rgba(124,77,189,0.12);
  border-radius:6px;pointer-events:none;z-index:1;
  border-top:1.5px solid rgba(124,77,189,0.3);
  border-bottom:1.5px solid rgba(124,77,189,0.3);
}
.drum-inner{
  display:flex;flex-direction:column;align-items:center;
  will-change:transform;
}
.drum-item{
  height:30px;line-height:30px;
  font-size:19px;font-weight:900;
  color:var(--text-dark);
  text-align:center;width:38px;
  font-variant-numeric:tabular-nums;
}
.drum-item.dim{color:rgba(152,128,184,0.35);font-size:13px;font-weight:600}
.drum-item.near{color:rgba(96,64,160,0.6);font-size:15px}
.timer-colon{
  font-size:20px;font-weight:900;color:var(--purple);
  padding:0 2px;line-height:90px;flex-shrink:0;
  margin-bottom:0;
}

/* ── Buttons ── */
.bloom-btn{
  width:100%;background:var(--pill);
  border:none;border-radius:50px;
  padding:11px 0;
  font-size:13px;font-weight:700;
  color:var(--text-mid);
  cursor:pointer;
  margin-bottom:8px;
  font-family:'Nunito',sans-serif;
  transition:background 0.15s;
}
.bloom-btn:hover{background:var(--pill-hover)}

.done-btn{ 
  width:100%; 
  background:var(--purple); 
  border:none;border-radius:50px; 
  padding:12px 0; 
  font-size:13px;
  font-weight:700;   
  color:#fff;cursor:pointer; 
  margin-bottom:8px; 
  font-family:'Nunito',sans-serif; 
  transition:background 0.15s,transform 0.12s; 
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px; } 
.done-btn:hover{
  background:#28a745;
  transform:scale(0.98)}

.add-btn{
  width:100%;background:var(--pill);
  border:none;border-radius:50px;
  padding:11px 0;
  font-size:18px;font-weight:700;
  color:var(--text-mid);
  cursor:pointer;
  font-family:'Nunito',sans-serif;
  transition:background 0.15s;
}
.add-btn:hover{background:var(--pill-hover)}

/* ── Ask section ── */
.ask-section{
  display:flex;flex-direction:column;align-items:center;
  padding:14px 0 4px;gap:6px;
}
.ask-circle{
  width:44px;height:44px;border-radius:50%;
  background:#a598c8;
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 12px rgba(100,70,180,0.25);
  transition:transform 0.15s;
}
.ask-circle:hover{transform:scale(1.07)}
.ask-circle svg{
  width:22px;height:22px;
  stroke:white;fill:none;
  stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;
}
.ask-label{font-size:15px;font-weight:800;color:var(--text-dark)}
</style>
</head>

<script>
const ITEM_H = 30;
let taskIdCounter = 0;
const tasks = {};
let bloomActive = false;

const params = new URLSearchParams(window.location.search);
document.getElementById('subject-name').textContent = params.get('subject') || 'Subject';

function addTask() {
  const id = ++taskIdCounter;
  tasks[id] = { h:0, m:0, s:0, interval:null, running:false, elapsed:0, mode:null };

  const list = document.getElementById('task-list');
  const el = document.createElement('div');
  el.className = 'task-item';
  el.id = `task-${id}`;
  el.innerHTML = `
    <input class="task-name-input" placeholder="Task name…"/>
    <div style="display:flex;align-items:center;justify-content:center;gap:0">
      ${drumColHTML(id,'h',0,23,'hrs')}
      <div class="timer-colon">:</div>
      ${drumColHTML(id,'m',0,59,'min')}
      <div class="timer-colon">:</div>
      ${drumColHTML(id,'s',0,59,'sec')}
    </div>
    <div style="display:flex;gap:6px;margin-top:8px">
      <button id="startbtn-${id}" onclick="toggleTimer(${id})" style="flex:1;padding:8px 0;border:none;border-radius:50px;background:#6a35c9;color:white;font-family:Nunito,sans-serif;font-weight:700;font-size:12px;cursor:pointer;">▶ Start</button>
      <button onclick="resetTimer(${id})" style="flex:1;padding:8px 0;border:none;border-radius:50px;background:rgba(180,160,220,0.4);color:#6040a0;font-family:Nunito,sans-serif;font-weight:700;font-size:12px;cursor:pointer;">↺ Reset</button>
      <button onclick="deleteTask(${id})" style="width:32px;padding:8px 0;border:none;border-radius:50px;background:rgba(180,100,120,0.15);color:#c06080;font-family:Nunito,sans-serif;font-weight:700;font-size:12px;cursor:pointer;">✕</button>
    </div>
    <div id="elapsed-${id}" style="font-size:10px;color:#9880b8;text-align:center;margin-top:4px;font-weight:700;"></div>
  `;
  list.appendChild(el);
  initDrum(id);
}

function drumColHTML(id, unit, min, max, label) {
  let items = '';
  for (let i=0;i<2;i++) items+=`<div class="drum-item dim" data-val="-1" style="opacity:0"> </div>`;
  for (let i=min;i<=max;i++) items+=`<div class="drum-item" data-val="${i}">${String(i).padStart(2,'0')}</div>`;
  for (let i=0;i<2;i++) items+=`<div class="drum-item dim" data-val="-1" style="opacity:0"> </div>`;
  return `<div style="display:flex;flex-direction:column;align-items:center">
    <div style="font-size:9px;font-weight:800;color:#9880b8;letter-spacing:1.5px;text-transform:uppercase;padding-bottom:2px">${label}</div>
    <div class="drum-scroll-wrap" id="scroll-${id}-${unit}">
      <div class="drum-highlight"></div>
      <div class="drum-inner" id="inner-${id}-${unit}">${items}</div>
    </div>
  </div>`;
}

function initDrum(id) {
  ['h','m','s'].forEach(unit => {
    const scroll = document.getElementById(`scroll-${id}-${unit}`);
    let startY=0, startVal=0, dragging=false, velocity=0, lastY=0, lastTime=0;
    const getMax = () => unit==='h'?23:59;
    const getVal = () => tasks[id][unit];
    const setVal = v => {
      v = Math.max(0,Math.min(getMax(),Math.round(v)));
      tasks[id][unit] = v;
      updateDrumPos(id,unit,true);
    };
    scroll.addEventListener('mousedown', e=>{ startY=e.clientY;startVal=getVal();lastY=e.clientY;lastTime=Date.now();velocity=0;dragging=true;e.preventDefault(); });
    scroll.addEventListener('touchstart', e=>{ startY=e.touches[0].clientY;startVal=getVal();lastY=startY;lastTime=Date.now();velocity=0;dragging=true; },{passive:true});
    window.addEventListener('mousemove', e=>{
      if(!dragging)return;
      const now=Date.now();velocity=(lastY-e.clientY)/(now-lastTime+1);lastY=e.clientY;lastTime=now;
      setVal(startVal+(startY-e.clientY)/ITEM_H);
    });
    window.addEventListener('touchmove', e=>{
      if(!dragging)return;
      const now=Date.now();velocity=(lastY-e.touches[0].clientY)/(now-lastTime+1);lastY=e.touches[0].clientY;lastTime=now;
      setVal(startVal+(startY-lastY)/ITEM_H);
    },{passive:true});
    const onEnd = ()=>{ if(!dragging)return;dragging=false;if(Math.abs(velocity)>0.3)setVal(getVal()+velocity*6); };
    window.addEventListener('mouseup',onEnd);
    window.addEventListener('touchend',onEnd);
    scroll.addEventListener('wheel', e=>{ e.preventDefault();setVal(getVal()+Math.sign(e.deltaY)); },{passive:false});
    updateDrumPos(id,unit,false);
  });
}

function updateDrumPos(id,unit,animate) {
  const val = tasks[id][unit];
  const inner = document.getElementById(`inner-${id}-${unit}`);
  if(!inner)return;
  const offset = (val+2)*ITEM_H-(90/2-ITEM_H/2);
  inner.style.transition = animate?'transform 0.12s cubic-bezier(0.25,0.46,0.45,0.94)':'none';
  inner.style.transform = `translateY(${-offset}px)`;
  inner.querySelectorAll('.drum-item').forEach(el=>{
    const v=parseInt(el.dataset.val);if(v<0)return;
    const diff=Math.abs(v-val);
    el.classList.remove('dim','near');
    if(diff===1)el.classList.add('near');
    else if(diff>1)el.classList.add('dim');
  });
}

function toggleTimer(id) {
  const t=tasks[id];
  const btn=document.getElementById(`startbtn-${id}`);
  if(t.running){
    clearInterval(t.interval);t.interval=null;t.running=false;
    btn.textContent='▶ Resume';btn.style.background='#6a35c9';return;
  }
  const total=t.h*3600+t.m*60+t.s;
  t.running=true;btn.textContent='⏸ Pause';btn.style.background='#b05090';
  if(total>0&&t.elapsed===0){
    t.mode='down';t.remaining=total;
    t.interval=setInterval(()=>{
      t.remaining--;t.elapsed++;
      if(t.remaining<=0){
        t.remaining=0;clearInterval(t.interval);t.interval=null;t.running=false;
        btn.textContent='✓ Done';btn.style.background='#4caf7d';
        setFromSeconds(id,0);
        document.getElementById(`elapsed-${id}`).textContent=`✓ Done! ${fmt(t.elapsed)}`;return;
      }
      setFromSeconds(id,t.remaining);
      document.getElementById(`elapsed-${id}`).textContent=`⏱ ${fmt(t.elapsed)}`;
    },1000);
  } else {
    t.mode='up';
    t.interval=setInterval(()=>{
      t.elapsed++;setFromSeconds(id,t.elapsed);
      document.getElementById(`elapsed-${id}`).textContent=`⏱ ${fmt(t.elapsed)}`;
    },1000);
  }
}

function resetTimer(id) {
  const t=tasks[id];clearInterval(t.interval);
  Object.assign(t,{interval:null,running:false,elapsed:0,remaining:0,h:0,m:0,s:0});
  ['h','m','s'].forEach(u=>updateDrumPos(id,u,true));
  const btn=document.getElementById(`startbtn-${id}`);
  btn.textContent='▶ Start';btn.style.background='#6a35c9';
  document.getElementById(`elapsed-${id}`).textContent='';
}

function setFromSeconds(id,total) {
  tasks[id].h=Math.floor(total/3600);
  tasks[id].m=Math.floor((total%3600)/60);
  tasks[id].s=total%60;
  ['h','m','s'].forEach(u=>updateDrumPos(id,u,true));
}

function fmt(s) {
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  if(h)return `${h}h ${m}m ${sec}s`;
  if(m)return `${m}m ${sec}s`;
  return `${sec}s`;
}

function deleteTask(id) {
  clearInterval(tasks[id]?.interval);delete tasks[id];
  document.getElementById(`task-${id}`)?.remove();
}

function toggleBloom() {
  // OyuBloom mode action placeholder
}

function markDone() {
  Object.values(tasks).forEach(t=>clearInterval(t.interval));
}

addTask();
