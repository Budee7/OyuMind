<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>OyuMind – Delete Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #120828;
      font-family: 'Nunito', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ── 300×640 phone ── */
    .phone {
      width: 300px;
      height: 640px;
      background: linear-gradient(180deg, #1a1040 0%, #2a0f60 40%, #3d0e8a 100%);
      border-radius: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 120px;
      padding-bottom: 36px;
      position: relative;
      overflow: visible;
      box-shadow: 0 30px 70px rgba(5,2,20,0.8);
    }

    /* tagline */
    .tagline {
      position: absolute;
      bottom: 22px;
      left: 0; right: 0;
      text-align: center;
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(180,160,220,0.4);
      font-weight: 400;
    }
    .tagline span { color: rgba(200,150,170,0.45); margin: 0 3px; }

    /* ── Lilac card ── */
    .lilac-card {
      width: 240px;
      background: linear-gradient(150deg, #cfc8e0 0%, #c0b8d5 100%);
      border-radius: 28px;
      padding: 26px 18px 26px;
      position: relative;
      box-shadow: 0 10px 40px rgba(10,5,40,0.35);
    }

    /* ── Avatar overflowing top ── */
    .avatar {
      position: absolute;
      top: -48px;
      left: 50%;
      transform: translateX(-50%);
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(145deg, #d8d2e8, #c4bdd8);
      box-shadow: 0 4px 16px rgba(60,30,100,0.18);
      overflow: hidden;
    }
    .avatar::before {
      content: '';
      position: absolute;
      width: 34px; height: 34px;
      border-radius: 50%;
      background: #a89cc0;
      top: 17px;
      left: 50%;
      transform: translateX(-50%);
    }
    .avatar::after {
      content: '';
      position: absolute;
      width: 66px; height: 46px;
      border-radius: 50% 50% 0 0;
      background: #a89cc0;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
    }

    /* ── Back button ── */
    .back-btn {
      position: absolute;
      top: 16px;
      left: 16px;
      width: 34px; height: 34px;
      border-radius: 50%;
      background: rgba(130,90,200,0.22);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #4a2898;
      font-size: 16px;
      font-weight: 800;
      transition: background 0.18s;
    }
    .back-btn:hover { background: rgba(130,90,200,0.4); }

    /* spacer below avatar */
    .avatar-spacer { height: 34px; }

    /* ── Delete inner card — dusty rose ── */
    .delete-card {
      background: linear-gradient(145deg, #d4b4b0, #c8a8a4);
      border-radius: 22px;
      padding: 22px 16px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      box-shadow: 0 4px 20px rgba(80,30,60,0.15);
    }

    .delete-title {
      font-size: 19px;
      font-weight: 800;
      color: #1e1040;
      text-align: center;
    }

    /* ── "Delete my account" row pill ── */
    .delete-row {
      width: 100%;
      background: #f5e0d8;
      border-radius: 18px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: background 0.18s;
    }
    .delete-row:hover { background: #f0d0c4; }

    .delete-row-text {
      font-size: 12px;
      font-weight: 600;
      color: #2a1a50;
    }

    /* minus / delete icon */
    .delete-icon {
      width: 26px; height: 26px;
      border-radius: 6px;
      border: 2px solid #4a2898;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .delete-icon::after {
      content: '−';
      color: #4a2898;
      font-size: 18px;
      font-weight: 800;
      line-height: 1;
    }
  </style>
</head>
<body>

<div class="phone">

  <div class="lilac-card">
    <!-- Avatar -->
    <div class="avatar"></div>

    <!-- Back button -->
    <button class="back-btn" onclick="history.back()">&#8592;</button>

    <!-- Spacer -->
    <div class="avatar-spacer"></div>

    <!-- Delete card -->
    <div class="delete-card">
      <div class="delete-title">Delete Account</div>
      <div class="delete-row" onclick="location.href='index.html'">
        <span class="delete-row-text">Delete my account</span>
        <div class="delete-icon"></div>
      </div>
    </div>
  </div>

  <div class="tagline">focus <span>•</span> balance <span>•</span> bloom</div>

</div>

</body>
</html>
